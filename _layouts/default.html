<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400;1,7..72,500&display=swap" rel="stylesheet">
  <script>
    (function () {
      // Dark is the unconditional first-visit default (per DESIGN.md's
      // Dark-First Rule) — it does NOT defer to system prefers-color-scheme,
      // since most OSes ship light-by-default, which would silently make
      // most first-time visitors never see the site's brand-defining dark
      // theme. Only a stored choice (the user's own toggle click) overrides
      // it. The <html> tag's static data-theme="dark" attribute is the
      // fallback for when this script hasn't run yet or fails to load.
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.setAttribute('data-theme', t);
      }
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% feed_meta %}
  {% seo %}
  {% include jsonld.html %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-shell">
      <div class="site-header-bar">
        <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>
        <div class="site-header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/writing/' | relative_url }}"{% if page.url == '/writing/' or page.layout == 'story' or page.layout == 'essay' %} aria-current="page"{% endif %}>Writing</a>
            <a href="{{ '/moral-arithmetic/' | relative_url }}"{% if page.url == '/moral-arithmetic/' %} aria-current="page"{% endif %}>Moral Arithmetic</a>
            <a href="{{ '/subscribe/' | relative_url }}"{% if page.url == '/subscribe/' %} aria-current="page"{% endif %}>Newsletter</a>
            <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
            <a href="{{ '/contact/' | relative_url }}"{% if page.url == '/contact/' %} aria-current="page"{% endif %}>Contact</a>
          </nav>
          <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch to light mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>
  <main id="main" class="page">{{ content }}</main>
  <footer class="site-footer">
    <div class="site-shell">
      <nav class="site-footer-links" aria-label="Site links">
        <a class="site-footer-link" href="https://bsky.app/profile/thmercer.com" target="_blank" rel="noopener me">
          <svg class="site-footer-icon" width="18" height="18" viewBox="0 -3.268 64 68.414" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round" aria-hidden="true"><path d="M13.873 3.805C21.21 9.332 29.103 20.537 32 26.55v15.882c0-.338-.13.044-.41.867-1.512 4.456-7.418 21.847-20.923 7.944-7.111-7.32-3.819-14.64 9.125-16.85-7.405 1.264-15.73-.825-18.014-9.015C1.12 23.022 0 8.51 0 6.55 0-3.268 8.579-.182 13.873 3.805z"/><path d="M50.127 3.805C42.79 9.332 34.897 20.537 32 26.55v15.882c0-.338.13.044.41.867 1.512 4.456 7.418 21.847 20.923 7.944 7.111-7.32 3.819-14.64-9.125-16.85 7.405 1.264 15.73-.825 18.014-9.015C62.88 23.022 64 8.51 64 6.55c0-9.818-8.578-6.732-13.873-2.745z"/></svg>
          <span>Bluesky</span>
        </a>
        <a class="site-footer-link" href="{{ '/subscribe/' | relative_url }}">
          <svg class="site-footer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <span>Newsletter</span>
        </a>
        <a class="site-footer-link" href="{{ '/feed.xml' | relative_url }}">
          <svg class="site-footer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
          <span>RSS</span>
        </a>
      </nav>
    </div>
  </footer>
  <script src="{{ '/assets/js/theme.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
</body>
</html>
