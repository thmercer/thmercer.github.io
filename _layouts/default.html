<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% feed_meta %}
  {% seo %}
  {% include jsonld.html %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav aria-label="Primary">
      <a href="{{ '/fiction/' | relative_url }}"{% if page.url == '/fiction/' %} aria-current="page"{% endif %}>Fiction</a>
      <a href="{{ '/essays/' | relative_url }}"{% if page.url == '/essays/' %} aria-current="page"{% endif %}>Essays</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
      <a href="https://buttondown.com/thmercer" target="_blank" rel="noopener">Subscribe</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </header>
  <main id="main">{{ content }}</main>
  <footer>
    <a href="https://bsky.app/profile/thmercer.bsky.social" target="_blank" rel="noopener me">Bluesky</a>
  </footer>
</body>
</html>
