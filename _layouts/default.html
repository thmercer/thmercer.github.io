<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.setAttribute('data-theme', t);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% feed_meta %}
  {% seo %}
  {% include jsonld.html %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-shell">
      <div class="site-header-bar">
        <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>
        <div class="site-header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/fiction/' | relative_url }}"{% if page.url == '/fiction/' %} aria-current="page"{% endif %}>Fiction</a>
            <a href="{{ '/publications/' | relative_url }}"{% if page.url == '/publications/' %} aria-current="page"{% endif %}>Publications</a>
            <a href="{{ '/essays/' | relative_url }}"{% if page.url == '/essays/' %} aria-current="page"{% endif %}>Essays</a>
            <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a>
          </nav>
          <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>
  <main id="main" class="page">{{ content }}</main>
  <footer class="site-footer">
    <div class="site-shell">
      <nav class="site-footer-links" aria-label="Site links">
        <a class="site-footer-link" href="https://bsky.app/profile/thmercer.com" target="_blank" rel="noopener me">
          <svg class="site-footer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 5c-2 2.5-5 2.5-5 6a6 6 0 0 0 11 3.5"/><path d="M18 5c2 2.5 5 2.5 5 6a6 6 0 0 1-11 3.5"/></svg>
          <span>Bluesky</span>
        </a>
        <a class="site-footer-link" href="https://buttondown.com/thmercer" target="_blank" rel="noopener" title="Mailing list signup">
          <svg class="site-footer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <span>Newsletter</span>
        </a>
        <a class="site-footer-link" href="{{ '/feed.xml' | relative_url }}">
          <svg class="site-footer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
          <span>RSS</span>
        </a>
      </nav>
    </div>
  </footer>
  <script src="{{ '/assets/js/theme.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
</body>
</html>
